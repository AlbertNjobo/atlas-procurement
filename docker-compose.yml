version: "3.8"

services:
  atlas:
    build: .
    container_name: procurely-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Prefer container path for Admin SDK (file is volume-mounted, not baked into image)
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/firebase-sa.json
    restart: unless-stopped
    volumes:
      - ./firebase-applet-config.json:/app/firebase-applet-config.json:ro
      - ./data:/app/data
      # Firebase Admin service account — required for verified ID tokens in production
      # Create with Firebase Console → Project settings → Service accounts
      - ./service-account.json:/run/secrets/firebase-sa.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: procurely-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      atlas:
        condition: service_healthy
    restart: unless-stopped
